# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build & Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: 1.19

    - name: Test
      run: go test -v ./...
      
    - name: Building
      run: ./build.sh

    - name: Commit version.txt
      uses: actions-js/push@master
      message: "Incremented version"
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
      #run: git add version.txt && git commit -m "Increment version to v$(cat version.txt)" && git push

    - name: "Read version"
      uses: andstor/file-reader-action@v1
      with:
        path: "version.txt"

    - name: Create a GitHub release
      uses: ncipollo/release-action@v1
      with:
        tag: "v${ steps.read_file.outputs.new_tag }"
        name: Release ${{ steps.read_file.outputs.new_tag }}
        body: ${{ steps.tag_version.outputs.changelog }}

#    - name: Tag release
#      run: git tag "v$(cat version.txt)"
#
#    - name: Push tag
#      run: git push origin "v$(cat version.txt)"

    - name: Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/v')
      with:
        files: bin/**.zip
