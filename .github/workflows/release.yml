# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build & Release

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Go
      uses: actions/setup-go@v3
      with:
        go-version: 1.19

    - name: Test
      run: go test -v ./...
      
    - name: Building
      run: ./build.sh

    - name: Commit version.txt
      run: git add version.txt && git push

    - name: Tag release
      run: git tag "v$(cat version.txt)"

    - name: Push tag
      run: git push origin "v$(cat version.txt)"
